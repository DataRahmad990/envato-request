<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Request Design Envato</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 36px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin: 0 auto 16px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 14px;
      color: #64748b;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 7px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input, textarea, select {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 12px 14px;
      color: #f1f5f9;
      font-size: 15px;
      font-family: inherit;
      transition: border-color 0.2s;
      outline: none;
    }

    input:focus, textarea:focus, select:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
    }

    input::placeholder, textarea::placeholder {
      color: #475569;
    }

    textarea {
      resize: vertical;
      min-height: 90px;
    }

    select option {
      background: #1e293b;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #25D366, #128C7E);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 8px;
    }

    .btn:hover { opacity: 0.92; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .btn svg {
      width: 22px;
      height: 22px;
      fill: white;
    }

    .note {
      text-align: center;
      font-size: 12px;
      color: #475569;
      margin-top: 16px;
    }

    .required { color: #f87171; margin-left: 2px; }

    .divider {
      height: 1px;
      background: #334155;
      margin: 24px 0;
    }

    .section-title {
      font-size: 12px;
      font-weight: 700;
      color: #6366f1;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 16px;
    }

    .design-block {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 14px;
    }

    .design-block-title {
      font-size: 13px;
      font-weight: 700;
      color: #818cf8;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .badge {
      background: #6366f1;
      color: white;
      font-size: 11px;
      font-weight: 700;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .optional-tag {
      font-size: 10px;
      color: #475569;
      font-weight: 400;
      margin-left: 4px;
      text-transform: none;
      letter-spacing: 0;
    }

    .design-block .form-group:last-child {
      margin-bottom: 0;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="header">
    <div class="logo">🎨</div>
    <h1>Request Design Envato</h1>
    <p class="subtitle">Isi form ini untuk request design ke admin</p>
  </div>

  <form id="requestForm">

    <div class="section-title">Info Requester</div>

    <div class="form-group">
      <label>Nama Kamu <span class="required">*</span></label>
      <input type="text" id="nama" placeholder="Nama kamu..." required />
    </div>

    <div class="divider"></div>
    <div class="section-title">Detail Request <span class="optional-tag">(max 3 design)</span></div>

    <!-- Design 1 -->
    <div class="design-block">
      <div class="design-block-title"><span class="badge">1</span> Design Pertama <span class="required">*</span></div>
      <div class="form-group">
        <label>Jenis File <span class="required">*</span></label>
        <select id="jenis1" required>
          <option value="" disabled selected>Pilih jenis file...</option>
          <option value="Template Website">🌐 Template Website</option>
          <option value="Template Presentasi">📊 Template Presentasi</option>
          <option value="Mockup">🖼️ Mockup</option>
          <option value="Logo / Branding">✏️ Logo / Branding</option>
          <option value="Social Media Kit">📱 Social Media Kit</option>
          <option value="Video Template">🎬 Video Template</option>
          <option value="Plugin / Script">🔧 Plugin / Script</option>
          <option value="Lainnya">📦 Lainnya</option>
        </select>
      </div>
      <div class="form-group">
        <label>Nama Design <span class="required">*</span></label>
        <input type="text" id="namaDesign1" placeholder="Nama design atau item di Envato..." required />
      </div>
      <div class="form-group">
        <label>Link Envato <span class="required">*</span></label>
        <input type="url" id="link1" placeholder="https://themeforest.net/item/..." required />
      </div>
    </div>

    <!-- Design 2 -->
    <div class="design-block">
      <div class="design-block-title"><span class="badge" style="background:#8b5cf6">2</span> Design Kedua <span class="optional-tag">(opsional)</span></div>
      <div class="form-group">
        <label>Jenis File</label>
        <select id="jenis2">
          <option value="" selected>— Kosongkan jika tidak ada —</option>
          <option value="Template Website">🌐 Template Website</option>
          <option value="Template Presentasi">📊 Template Presentasi</option>
          <option value="Mockup">🖼️ Mockup</option>
          <option value="Logo / Branding">✏️ Logo / Branding</option>
          <option value="Social Media Kit">📱 Social Media Kit</option>
          <option value="Video Template">🎬 Video Template</option>
          <option value="Plugin / Script">🔧 Plugin / Script</option>
          <option value="Lainnya">📦 Lainnya</option>
        </select>
      </div>
      <div class="form-group">
        <label>Nama Design</label>
        <input type="text" id="namaDesign2" placeholder="Nama design atau item di Envato..." />
      </div>
      <div class="form-group">
        <label>Link Envato</label>
        <input type="url" id="link2" placeholder="https://themeforest.net/item/..." />
      </div>
    </div>

    <!-- Design 3 -->
    <div class="design-block">
      <div class="design-block-title"><span class="badge" style="background:#a855f7">3</span> Design Ketiga <span class="optional-tag">(opsional)</span></div>
      <div class="form-group">
        <label>Jenis File</label>
        <select id="jenis3">
          <option value="" selected>— Kosongkan jika tidak ada —</option>
          <option value="Template Website">🌐 Template Website</option>
          <option value="Template Presentasi">📊 Template Presentasi</option>
          <option value="Mockup">🖼️ Mockup</option>
          <option value="Logo / Branding">✏️ Logo / Branding</option>
          <option value="Social Media Kit">📱 Social Media Kit</option>
          <option value="Video Template">🎬 Video Template</option>
          <option value="Plugin / Script">🔧 Plugin / Script</option>
          <option value="Lainnya">📦 Lainnya</option>
        </select>
      </div>
      <div class="form-group">
        <label>Nama Design</label>
        <input type="text" id="namaDesign3" placeholder="Nama design atau item di Envato..." />
      </div>
      <div class="form-group">
        <label>Link Envato</label>
        <input type="url" id="link3" placeholder="https://themeforest.net/item/..." />
      </div>
    </div>

    <div class="form-group">
      <label>Catatan Tambahan</label>
      <textarea id="catatan" placeholder="Kebutuhan khusus, deadline, atau info lain..."></textarea>
    </div>

    <button type="submit" class="btn">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
      </svg>
      Kirim via WhatsApp
    </button>
  </form>

  <p class="note">Form ini akan membuka WhatsApp dengan pesan yang sudah terformat.<br>Tinggal tap <strong>Send</strong> ✓</p>
</div>

<script>
  document.getElementById('requestForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const nama    = document.getElementById('nama').value.trim();
    const catatan = document.getElementById('catatan').value.trim();

    const designs = [
      { jenis: document.getElementById('jenis1').value, nama: document.getElementById('namaDesign1').value.trim(), link: document.getElementById('link1').value.trim() },
      { jenis: document.getElementById('jenis2').value, nama: document.getElementById('namaDesign2').value.trim(), link: document.getElementById('link2').value.trim() },
      { jenis: document.getElementById('jenis3').value, nama: document.getElementById('namaDesign3').value.trim(), link: document.getElementById('link3').value.trim() },
    ].filter(d => d.nama && d.link);

    const now = new Date().toLocaleString('id-ID', {
      day: '2-digit', month: 'long', year: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });

    const icons = ['1️⃣', '2️⃣', '3️⃣'];
    const designLines = designs.map((d, i) =>
`${icons[i]} *Design ${i + 1}*
   📁 ${d.jenis || 'Lainnya'}
   📝 ${d.nama}
   🔗 ${d.link}`
    ).join('\n\n');

    const pesan =
`🎨 *REQUEST DESIGN ENVATO*
━━━━━━━━━━━━━━━━━━
👤 *Requester:* ${nama}
📦 *Jumlah:* ${designs.length} design

${designLines}${catatan ? `\n\n💬 *Catatan:* ${catatan}` : ''}
━━━━━━━━━━━━━━━━━━
🕐 ${now}`;

    const nomor = '6285117159634';
    const url = `https://wa.me/${nomor}?text=${encodeURIComponent(pesan)}`;

    window.open(url, '_blank');
  });
</script>

</body>
</html>
